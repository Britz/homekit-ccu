# homekit-ccu lighttpd proxy config                                                                      
# Proxies API/websocket requests to the config server on localhost:39874                                 
# Static UI files are served by lighttpd from /addons/homekit-ccu/ on port 80                            
# Auth is disabled here — the config server validates the CCU session (sid) itself                     
# CORS is handled by the config server, not lighttpd                                                     
                                                                                                         
#--------------------------------------------------                                                      
# HomeKit-CCU Server without SSL (:9874 -> :39874)                                                       
#--------------------------------------------------                                                      
else $SERVER["socket"] == ":9874" {                                                                      
  auth.require = ()                                                                                      
  ssl.engine = "disable"                                                                                 
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))                      
}                                                                                                        
else $SERVER["socket"] == "[::]:9874" {                                                                  
  auth.require = ()                                                                                      
  ssl.engine = "disable"                                                                                 
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))                      
}                                                                                                        
                                                                                                         
#--------------------------------------------------                                                      
# HomeKit-CCU Server with SSL (:49874 -> :39874)                                                         
#--------------------------------------------------                                                      
else $SERVER["socket"] == ":49874" {     
  auth.require = ()                                                                                      
  ssl.engine = "enable"                                                                
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))                      
}                                                                                                        
else $SERVER["socket"] == "[::]:49874" {  
  auth.require = ()                                                                                      
  ssl.engine = "enable"                                                               
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))                      
}   