# hap-homematic lighttpd proxy config
# Proxies API/websocket requests to the config server on localhost:39874
# Static UI files are served by lighttpd from /addons/hap-homematic/ on port 80
# Auth is disabled here — the config server validates the CCU session (sid) itself
# CORS is handled by the config server, not lighttpd

$SERVER["socket"] == ":9874" {
  ssl.engine = "disable"
  auth.require = ()
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))
}
$SERVER["socket"] == "[::]:9874" {
  ssl.engine = "disable"
  auth.require = ()
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))
}
$SERVER["socket"] == ":49874" {
  auth.require = ()
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))
}
$SERVER["socket"] == "[::]:49874" {
  auth.require = ()
  proxy.server = ( "" => ("localhost" => ("host" => "127.0.0.1", "port" => 39874)))
}
