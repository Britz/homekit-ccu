services:
  ccu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openccu-dev
    hostname: openccu
    privileged: true
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ..:/workspace:cached
    ports:
      - "8080:80"     # WebUI / JSON-RPC API
      - "8181:8181"   # Rega scripting
      - "2001:2001"   # BidCos-RF XML-RPC (proxied via lighttpd)
      - "2010:2010"   # HmIP-RF XML-RPC (proxied via lighttpd)
      - "9292:9292"   # VirtualDevices XML-RPC (proxied via lighttpd)
      - "9874:9874"   # hap-homematic Config UI
      - "9875:9875"   # hap-homematic RPC event server
      - "9877:9877"   # hap-homematic HAP instance 0
      - "9878:9878"   # hap-homematic HAP instance 1
      - "9879:9879"   # hap-homematic HAP instance 2
      - "49874:49874" # hap-homematic Config UI (HTTPS via lighttpd)
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/api/homematic.cgi || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
